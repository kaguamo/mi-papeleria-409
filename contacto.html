<h2>Déjanos tu opinión ¡Gracias!</h2>


<form name="contactos" method="POST" data-netlify="true" action="/gracias.html">
  <input type="hidden" name="form-name" value="contactos"/>
  <label for="nombre">Nombre:</label>
  <input type="text" id="nombre" name="nombre" required>

  <label for="email">Correo electrónico:</label>
  <input type="email" id="email" name="email" required>

  <label for="producto">Producto que evalúas:</label>
  <input type="text" id="producto" name="producto">

  <label for="opinion">¿Qué te pareció el producto?</label>
  <select id="opinion" name="opinion" required>
    <option value="" selected disabled>Selecciona una opción</option>
    <option value="Excelente">Excelente</option>
    <option value="Bueno">Bueno</option>
    <option value="Regular">Regular</option>
    <option value="Malo">Malo</option>
    <option value="No lo recomiendo">No lo recomiendo</option>
  </select>



  <div style="margin-top:15px;">
    <label>
      <input type="checkbox" id="mostrarSugerencia">
      Deseo agregar una sugerencia o crítica
    </label>
  </div>

  <div id="contenedorSugerencia" style="display:none; margin-top:15px;">
    <label for="sugerencia">Sugerencia o crítica:</label>
    <textarea id="sugerencia" name="sugerencia" rows="4"></textarea>
  </div>

  <button type="submit" class="btn">Enviar</button>
</form>

<a href="index.html" class="btn" style="display:inline-block; margin-top:20px; text-align:center;">
  Regresar
</a>
